services:

  database:
    container_name: gee-database
    build:
      context: ./database
    ports:
      - "5431:5432"
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${DB_USER}", "-d", "${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 30s
    
  redis:
    container_name: gee-redis
    image: redis:alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    
  minio:
    container_name: gee-minio
    image: minio/minio
    ports:
      - "9000:9000" # API
      - "9001:9001" # WEB
    environment:
      MINIO_ROOT_USER: ${STORAGE_S3_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${STORAGE_S3_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "${STORAGE_S3_PUBLIC_URL}/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 5

  backend:
    container_name: gee-backend
    build:
      context: ./backend
    ports:
      - "8080:8080"
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      STORAGE_S3_ACCESS_KEY: ${STORAGE_S3_ROOT_USER}
      STORAGE_S3_SECRET_KEY: ${STORAGE_S3_ROOT_PASSWORD}
      STORAGE_S3_INTERNAL_URL: ${STORAGE_S3_INTERNAL_URL}
      STORAGE_S3_PUBLIC_URL: ${STORAGE_S3_PUBLIC_URL}
      BUCKETS_USERS: ${BUCKETS_USERS}
      BUCKETS_FLAGS: ${BUCKETS_FLAGS}
      FRONTEND_BASE_URL: ${FRONTEND_BASE_URL}
      SPRING_DATA_REDIS_HOST: ${REDIS_HOST}
      SPRING_DATA_REDIS_PORT: ${REDIS_PORT}
    depends_on:
      database: 
        condition: service_healthy
      redis:
        condition: service_healthy
    
  frontend:
    container_name: gee-frontend
    build:
      context: ./frontend
    ports:
      - "5173:80"
    environment:
      BACKEND_API_BASE_URL: ${BACKEND_API_BASE_URL}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    
  createbuckets:
    container_name: gee-create-buckets
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    volumes:
      - ./database/current-database/core/data/example-avatars:/example-avatars
      - ./database/current-database/core/data/flags:/flags
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set minio_server ${STORAGE_S3_INTERNAL_URL} ${STORAGE_S3_ROOT_USER} ${STORAGE_S3_ROOT_PASSWORD};
      
      /usr/bin/mc mb --ignore-existing minio_server/${BUCKETS_USERS};
      /usr/bin/mc anonymous set download minio_server/${BUCKETS_USERS};
      /usr/bin/mc cp --recursive /example-avatars/ minio_server/${BUCKETS_USERS}/example-avatars;
      
      /usr/bin/mc mb --ignore-existing minio_server/${BUCKETS_FLAGS};
      /usr/bin/mc anonymous set download minio_server/${BUCKETS_FLAGS};
      /usr/bin/mc cp --recursive /flags/ minio_server/${BUCKETS_FLAGS};
     
      exit 0;
      "
